const formatCurrency = (n) => "$" + n.toLocaleString();
const formatNumber = (n) => n.toLocaleString();
const easeOutExpo = (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t));

function useAnimatedValue(target, duration = 1800, delay = 0) {
  const [value, setValue] = useState(0);
  const startTime = useRef(null);
  const animFrame = useRef(null);
  useEffect(() => {
    const timeout = setTimeout(() => {
      startTime.current = performance.now();
      const animate = (now) => {
        const elapsed = now - startTime.current;
        const progress = Math.min(elapsed / duration, 1);
        setValue(Math.floor(easeOutExpo(progress) * target));
        if (progress < 1) animFrame.current = requestAnimationFrame(animate);
      };
      animFrame.current = requestAnimationFrame(animate);
    }, delay);
    return () => { clearTimeout(timeout); cancelAnimationFrame(animFrame.current); };
  }, [target, duration, delay]);
  return value;
}

          <div style={{ animation: "fadeIn 0.4s ease" }}>
            <p style={{ ...pStyle, marginBottom: 28, color: EAGLES.silver, borderBottom: `1px solid ${EAGLES.greenDark}`, paddingBottom: 20 }}>
              Every Class Action Campaign publishes a complete, transparent budget before a single dollar is collected. You can see exactly where your contribution goes.
            </p>
            {CAMPAIGN.budget.map((b, i) => (
              <BudgetRow key={b.item} {...b} index={i} eaglesTheme />
            ))}
            <div style={{
              marginTop: 24, paddingTop: 16, borderTop: `1px solid ${EAGLES.greenDark}`,
              display: "flex", justifyContent: "space-between",
              fontFamily: "'JetBrains Mono', monospace", fontSize: 14
            }}>
              <span style={{ color: EAGLES.silverLight }}>Total campaign budget</span>
              <span style={{ color: EAGLES.accent, fontWeight: 700 }}>{formatCurrency(CAMPAIGN.target)}</span>
            </div>
            <div style={{
              marginTop: 24, padding: "14px 18px",
              background: `rgba(0,76,84,0.2)`,
              border: `1px solid ${EAGLES.greenDark}`,
              borderRadius: 8, fontSize: 12, color: EAGLES.silver,
              fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.7
            }}>
              Average contribution: {formatCurrency(CAMPAIGN.avgContribution)} · 
              Median contribution: $5.00 · 
              Largest single contribution: $100.00 · 
              Platform fee: 8% of funds raised
            </div>
          </div>
        )}

        {activeSection === "escrow" && (
          <div style={{ animation: "fadeIn 0.4s ease" }}>
            <SectionBlock title="How Conditional Funding Works" eaglesTheme>
              <p style={pStyleEagles}>
                This is not a donation. It is a conditional commitment. Your money is held in escrow — it is never spent unless enough people commit to make the campaign viable.
              </p>
            </SectionBlock>
            {[
              { step: "01", title: "You commit — conditionally", desc: "Choose your contribution amount. Your payment method is charged, but the funds are held in escrow by Stripe — not by the campaign, not by the platform." },
              { step: "02", title: "The threshold must be met", desc: `This campaign requires ${formatCurrency(CAMPAIGN.target)} in conditional commitments from at least 10,000 Fractional Clients by ${CAMPAIGN.escrow.deadline}. Until that threshold is met, no money is released and no campaign work begins.` },
              { step: "03", title: "If the threshold is met → campaign executes", desc: "Funds are released from escrow to the vetted campaign providers. Work begins immediately. You receive progress updates throughout execution. Results are published publicly." },
              { step: "04", title: "If the threshold is not met → full refund", desc: "100% of your contribution is automatically returned to your original payment method. No partial campaigns. No wasted money. The mechanism only works at scale, by design." }
            ].map((s, i) => (
              <div key={s.step} style={{
                display: "flex", gap: 16, marginBottom: 24, paddingBottom: 24,
                borderBottom: i < 3 ? `1px solid ${EAGLES.greenDark}` : "none"
              }}>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
                  color: EAGLES.accent, minWidth: 28, paddingTop: 2
                }}>
                  {s.step}
                </div>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 6, color: EAGLES.white }}>{s.title}</div>
                  <p style={{ ...pStyleEagles, margin: 0 }}>{s.desc}</p>
                </div>
              </div>
            ))}
            <div style={{
              marginTop: 8, padding: "16px 20px",
              background: "rgba(92,219,149,0.06)",
              border: "1px solid rgba(92,219,149,0.15)",
              borderRadius: 8, display: "flex", alignItems: "flex-start", gap: 12
            }}>
              <div style={{ marginTop: 2 }}><ShieldIcon size={18} color={EAGLES.accentMuted} /></div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 13, color: EAGLES.accentMuted, marginBottom: 4 }}>The Escrow Guarantee</div>
                <p style={{ margin: 0, fontSize: 13, color: EAGLES.silver, lineHeight: 1.6, fontFamily: "'Source Serif 4', Georgia, serif" }}>
                  {CAMPAIGN.escrow.guarantee}
                </p>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{
        borderTop: `1px solid ${EAGLES.greenDark}`, padding: "16px 24px", textAlign: "center",
        fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: EAGLES.greenLight,
        letterSpacing: 2, textTransform: "uppercase"
      }}>
        Class Action Campaign Platform · Conditional Funding Prototype · 2026
      </div>
    </div>
  );
}

function SectionBlock({ title, children, eaglesTheme }) {
  return (
    <div style={{ marginBottom: 28 }}>
      <h3 style={{
        fontFamily: "'Playfair Display', Georgia, serif", fontSize: 18, fontWeight: 700,
        color: eaglesTheme ? EAGLES.white : "#e8e0d8",
        margin: "0 0 12px", paddingBottom: 8,
        borderBottom: eaglesTheme ? `1px solid ${EAGLES.greenDark}` : "1px solid #1a1a1a"
      }}>
        {title}
      </h3>
      {children}
    </div>
  );
}

const pStyle = {
  fontSize: 15, lineHeight: 1.7, color: "#999", margin: "0 0 16px",
  fontFamily: "'Source Serif 4', Georgia, serif"
};

const pStyleEagles = {
  fontSize: 15, lineHeight: 1.7, color: EAGLES.silver, margin: "0 0 16px",
  fontFamily: "'Source Serif 4', Georgia, serif"
};

// ============================================================
// MAIN
// ============================================================
function FundingPrototype() {
  const [layer, setLayer] = useState("hook");
  return (
    <div>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap');
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
          from { opacity: 0; transform: scale(0.8); }
          to { opacity: 1; transform: scale(1); }
        }
        * { box-sizing: border-box; }
        button:hover { opacity: 0.92; }
      `}</style>
      {layer === "hook" ? (
        <HookLayer onDetails={() => setLayer("details")} />
      ) : (
        <DetailLayer onBack={() => setLayer("hook")} />
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(FundingPrototype));
  </script>
</body>
</html>
